<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ABDE3"/>
      <stop offset="100%" stop-color="#0687B3"/>
    </linearGradient>
    <linearGradient id="arrow" x1="256" y1="340" x2="256" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Briefcase body -->
  <rect x="96" y="220" width="320" height="200" rx="36" fill="white" opacity="0.95"/>
  <!-- Briefcase handle -->
  <path d="M192 220v-40a40 40 0 0 1 40-40h48a40 40 0 0 1 40 40v40" stroke="white" stroke-width="28" fill="none" stroke-linecap="round" opacity="0.95"/>
  <!-- Upward arrow (AI/growth) -->
  <path d="M256 370 L256 250" stroke="url(#bg)" stroke-width="32" stroke-linecap="round"/>
  <path d="M200 306 L256 244 L312 306" stroke="url(#bg)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small AI sparkle dots -->
  <circle cx="160" cy="170" r="12" fill="white" opacity="0.5"/>
  <circle cx="352" cy="150" r="8" fill="white" opacity="0.4"/>
  <circle cx="390" cy="190" r="6" fill="white" opacity="0.3"/>
</svg>
